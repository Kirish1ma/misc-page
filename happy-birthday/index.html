<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>お誕生日おめでとう 超眠人</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        min-height: 100vh;
        overflow: hidden;
        font-family: "Noto Sans JP", "Yu Gothic", "Hiragino Sans", system-ui, sans-serif;
        color: #fff;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.35), transparent 24%),
          radial-gradient(circle at 80% 10%, rgba(255, 214, 230, 0.45), transparent 28%),
          linear-gradient(135deg, #ff7eb3 0%, #8e54e9 50%, #4776e6 100%);
      }

      .page {
        position: relative;
        display: grid;
        min-height: 100vh;
        place-items: center;
        padding: 24px;
      }

      .card {
        position: relative;
        z-index: 2;
        width: min(680px, 100%);
        padding: 48px 34px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.35);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.16);
        box-shadow: 0 30px 80px rgba(32, 20, 80, 0.35);
        backdrop-filter: blur(18px);
        animation: floatCard 4s ease-in-out infinite;
      }

      .badge {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 16px;
        margin-bottom: 22px;
        font-weight: 700;
        color: #6530a6;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.82);
      }

      h1 {
        margin-bottom: 18px;
        font-size: clamp(3rem, 9vw, 6.5rem);
        line-height: 1;
        letter-spacing: 0.04em;
        text-shadow: 0 8px 28px rgba(89, 36, 136, 0.45);
      }

      .message {
        max-width: 540px;
        margin: 0 auto 30px;
        font-size: clamp(1.1rem, 3vw, 1.45rem);
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.92);
      }

      .cake {
        width: 150px;
        height: 120px;
        margin: 0 auto 30px;
        position: relative;
      }

      .cake::before,
      .cake::after {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        content: "";
        border-radius: 18px 18px 12px 12px;
      }

      .cake::before {
        bottom: 0;
        width: 150px;
        height: 58px;
        background: linear-gradient(#ffe2f0 0 34%, #ff8fbd 34% 48%, #ffe2f0 48%);
        box-shadow: inset 0 -10px 0 rgba(255, 112, 167, 0.32);
      }

      .cake::after {
        bottom: 52px;
        width: 110px;
        height: 44px;
        background: linear-gradient(#fff7cc 0 40%, #ffc75f 40% 55%, #fff7cc 55%);
      }

      .candle {
        position: absolute;
        bottom: 96px;
        left: 50%;
        width: 12px;
        height: 34px;
        border-radius: 8px;
        background: repeating-linear-gradient(45deg, #fff 0 6px, #ff6f91 6px 12px);
        transform: translateX(-50%);
      }

      .flame {
        position: absolute;
        bottom: 130px;
        left: 50%;
        width: 22px;
        height: 30px;
        border-radius: 50% 50% 45% 45%;
        background: linear-gradient(#fff6a5, #ff9f1c 70%, #ff5e57);
        filter: drop-shadow(0 0 16px #ffd166);
        transform: translateX(-50%);
        animation: flicker 0.8s ease-in-out infinite alternate;
      }

      button {
        cursor: pointer;
        padding: 14px 28px;
        font-size: 1rem;
        font-weight: 800;
        color: #6f35c3;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #fff, #ffe3f0);
        box-shadow: 0 14px 30px rgba(68, 38, 118, 0.25);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      button:hover {
        transform: translateY(-3px) scale(1.03);
        box-shadow: 0 20px 36px rgba(68, 38, 118, 0.32);
      }

      .balloon {
        position: absolute;
        bottom: -160px;
        width: 78px;
        height: 96px;
        border-radius: 50% 50% 45% 45%;
        opacity: 0.85;
        animation: rise linear infinite;
      }

      .balloon::after {
        position: absolute;
        top: 92px;
        left: 50%;
        width: 2px;
        height: 96px;
        content: "";
        background: rgba(255, 255, 255, 0.55);
      }

      .balloon:nth-child(1) {
        left: 7%;
        background: #ffd166;
        animation-duration: 11s;
      }

      .balloon:nth-child(2) {
        left: 22%;
        background: #06d6a0;
        animation-duration: 14s;
        animation-delay: -4s;
        transform: scale(0.85);
      }

      .balloon:nth-child(3) {
        right: 20%;
        background: #ff6f91;
        animation-duration: 12s;
        animation-delay: -7s;
      }

      .balloon:nth-child(4) {
        right: 6%;
        background: #9bf6ff;
        animation-duration: 15s;
        animation-delay: -2s;
        transform: scale(0.9);
      }

      .confetti {
        position: fixed;
        top: -20px;
        width: 10px;
        height: 18px;
        pointer-events: none;
        opacity: 0.9;
        animation: fall 3.8s linear forwards;
      }

      .spark {
        position: fixed;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        pointer-events: none;
        animation: burst 900ms ease-out forwards;
      }

      @keyframes floatCard {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-10px);
        }
      }

      @keyframes flicker {
        from {
          transform: translateX(-50%) rotate(-4deg) scale(1);
        }

        to {
          transform: translateX(-50%) rotate(4deg) scale(1.12);
        }
      }

      @keyframes rise {
        from {
          translate: 0 0;
        }

        to {
          translate: 0 -125vh;
        }
      }

      @keyframes fall {
        to {
          transform: translateY(110vh) rotate(720deg);
        }
      }

      @keyframes burst {
        to {
          transform: translate(var(--x), var(--y)) scale(0);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="balloon"></div>
      <div class="balloon"></div>
      <div class="balloon"></div>
      <div class="balloon"></div>

      <section class="card">
        <div class="badge">🎉 特別な一日 🎉</div>
        <div class="cake">
          <div class="candle"></div>
          <div class="flame"></div>
        </div>
        <h1>お誕生日おめでとう</h1>
        <p class="message">
          素敵な一年になりますように。今日という特別な日が、たくさんの笑顔と幸せに包まれますよう心から願っています。
        </p>
        <button id="wishButton">お祝いを届ける ✨</button>
      </section>
    </main>

    <script>
      const colors = ["#ffd166", "#06d6a0", "#9bf6ff", "#ff6f91", "#f15bb5", "#fee440"];
      const button = document.querySelector("#wishButton");

      function createConfetti(amount = 70) {
        for (let i = 0; i < amount; i += 1) {
          const confetti = document.createElement("span");
          confetti.className = "confetti";
          confetti.style.left = `${Math.random() * 100}vw`;
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.animationDelay = `${Math.random() * 1.2}s`;
          confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 5000);
        }
      }

      function createFirework(x, y) {
        for (let i = 0; i < 28; i += 1) {
          const spark = document.createElement("span");
          const angle = (Math.PI * 2 * i) / 28;
          const distance = 70 + Math.random() * 90;

          spark.className = "spark";
          spark.style.left = `${x}px`;
          spark.style.top = `${y}px`;
          spark.style.background = colors[Math.floor(Math.random() * colors.length)];
          spark.style.setProperty("--x", `${Math.cos(angle) * distance}px`);
          spark.style.setProperty("--y", `${Math.sin(angle) * distance}px`);
          document.body.appendChild(spark);
          setTimeout(() => spark.remove(), 1000);
        }
      }

      button.addEventListener("click", (event) => {
        createConfetti(100);
        createFirework(event.clientX, event.clientY);
        button.textContent = "お祝いが届きました 💖";
        setTimeout(() => {
          button.textContent = "もう一度お祝いを届ける ✨";
        }, 1600);
      });

      createConfetti(45);
    </script>
  </body>
</html>
